<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit Details — Yntra Sparks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="components.css">
<style>
  .kd-layout{ display:grid; grid-template-columns:2fr 1fr; gap:var(--s-6); align-items:start; }
  @media (max-width:1100px){ .kd-layout{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="dash-shell">
  <aside class="sidebar">
    <a href="yntra-sparks.html" class="logo">
      <span class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="2" stroke-linejoin="round"/></svg></span>
      Yntra Sparks
    </a>
    <nav class="side-nav">
      <a href="teacher-portal.html" class="side-link">
        <svg width="18" height="18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="10" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="2" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="10" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/></svg>
        Dashboard
      </a>
      <a href="teacher-kits.html" class="side-link active">
        <svg width="18" height="18" fill="none"><rect x="2" y="6" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.6"/><path d="M6 6V4a1 1 0 011-1h4a1 1 0 011 1v2" stroke="currentColor" stroke-width="1.6"/></svg>
        My Kits
      </a>
      <a href="#" class="side-link">
        <svg width="18" height="18" fill="none"><rect x="2" y="3" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.6"/><path d="M7 6.5l4 2.5-4 2.5v-5z" fill="currentColor"/></svg>
        Videos
      </a>
      <a href="#" class="side-link">
        <svg width="18" height="18" fill="none"><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Profile
      </a>
      <a href="#" class="side-link">
        <svg width="18" height="18" fill="none"><circle cx="9" cy="9" r="2.4" stroke="currentColor" stroke-width="1.6"/><path d="M9 2v2M9 14v2M2 9h2M14 9h2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Settings
      </a>
    </nav>
    <div class="side-logout">
      <a href="#" id="logout-link" class="side-link">
        <svg width="18" height="18" fill="none"><path d="M7 15H4a1 1 0 01-1-1V4a1 1 0 011-1h3M12 12l4-4-4-4M16 8H7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <main class="dash-main">
    <div class="ys-breadcrumb" id="kit-breadcrumb"></div>
    <div class="kd-layout">
      <div id="kit-details-root"></div>
      <div>
        <div class="panel">
          <div class="panel-head"><h3>Related Kits</h3></div>
          <div id="related-kits"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/mock-data.js"></script>
<script src="js/components.js"></script>
<script src="js/teacher.js"></script>
<script src="js/animations.js"></script>
<script>
  YSTeacher.initKitDetailsPage();
  document.getElementById('logout-link').addEventListener('click', function (e) {
    e.preventDefault();
    YSAuth.logout('teacher-login.html');
  });
</script>
</body>
</html>
