<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchased Kits — Yntra Sparks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="components.css">
</head>
<body>

<div class="dash-shell">
  <aside class="sidebar">
    <a href="yntra-sparks.html" class="logo">
      <span class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="2" stroke-linejoin="round"/></svg></span>
      Yntra Sparks
    </a>
    <nav class="side-nav">
      <a href="admin-portal.html" class="side-link">
        <svg width="18" height="18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="10" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="2" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="10" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.6"/></svg>
        Dashboard
      </a>
      <a href="admin-portal.html#teachers" class="side-link">
        <svg width="18" height="18" fill="none"><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Teachers
      </a>
      <a href="admin-kits.html" class="side-link active">
        <svg width="18" height="18" fill="none"><rect x="2" y="6" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.6"/></svg>
        Purchased Kits
      </a>
    </nav>
    <div class="side-logout">
      <a href="#" id="logout-link" class="side-link">
        <svg width="18" height="18" fill="none"><path d="M7 15H4a1 1 0 01-1-1V4a1 1 0 011-1h3M12 12l4-4-4-4M16 8H7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <main class="dash-main">
    <div class="dash-topbar">
      <div><h1>Purchased Kits</h1><div class="sub" id="kits-count">Loading kits…</div></div>
    </div>
    <div class="table-toolbar">
      <div class="search-box">
        <svg width="16" height="16" fill="none"><circle cx="7" cy="7" r="5" stroke="#94A3B8" stroke-width="1.6"/><path d="M11 11l3.5 3.5" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input type="text" id="kit-search" placeholder="Search kits by name...">
      </div>
      <select id="category-filter" class="filter-chip" style="cursor:pointer;">
        <option value="all">All Categories</option>
      </select>
    </div>
    <div class="ys-kit-grid" id="kits-grid"></div>
    <div id="kits-pagination" style="margin-top:var(--s-6); display:flex; justify-content:center;"></div>
  </main>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/mock-data.js"></script>
<script src="js/components.js"></script>
<script src="js/animations.js"></script>
<script>
  // Reuses the same view-only rendering as the teacher kit browser —
  // Principal can view purchased kits but the card has no edit/delete affordance.
  var state = { search: '', category: 'all', page: 1, perPage: 6, all: [] };

  function kitCardHtml(kit){
    return `<div class="ys-kit-card">
      <div class="ys-kit-thumb-wrap"><img src="${kit.thumbnail}" alt="${YSUtils.escapeHtml(kit.title)}" loading="lazy"></div>
      <div class="body">
        <span class="badge blue" style="align-self:flex-start;">${kit.category}</span>
        <h4>${YSUtils.escapeHtml(kit.title)}</h4>
        <p>${YSUtils.escapeHtml(kit.description)}</p>
        <span class="badge gray" style="align-self:flex-start;">${kit.grade}</span>
      </div>
    </div>`;
  }

  function renderKits(){
    var grid = document.getElementById('kits-grid');
    var filtered = state.all.filter(function(k){
      var matchesSearch = !state.search || k.title.toLowerCase().indexOf(state.search.toLowerCase()) > -1;
      var matchesCat = state.category === 'all' || k.category === state.category;
      return matchesSearch && matchesCat;
    });
    var pageInfo = YSUtils.paginate(filtered, state.page, state.perPage);
    if(!pageInfo.pageItems.length){
      YSComponents.emptyState(grid, 'No kits found', 'Try a different search term or category.');
    } else {
      grid.innerHTML = pageInfo.pageItems.map(kitCardHtml).join('');
    }
    YSComponents.pagination(document.getElementById('kits-pagination'), pageInfo.page, pageInfo.totalPages, function(p){
      state.page = p; renderKits();
    });
    document.getElementById('kits-count').textContent = 'Showing ' + pageInfo.pageItems.length + ' of ' + pageInfo.total + ' kits';
  }

  document.getElementById('kits-grid').innerHTML = YSComponents.skeletonCards(6);
  YSApi.Kits.list().then(function(res){ state.all = res.data || []; renderKits(); });
  YSApi.Categories.list().then(function(res){
    var sel = document.getElementById('category-filter');
    (res.data || []).forEach(function(c){
      var opt = document.createElement('option');
      opt.value = c.name; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  });
  document.getElementById('kit-search').addEventListener('input', YSUtils.debounce(function(e){
    state.search = e.target.value; state.page = 1; renderKits();
  }, 250));
  document.getElementById('category-filter').addEventListener('change', function(e){
    state.category = e.target.value; state.page = 1; renderKits();
  });

  document.getElementById('logout-link').addEventListener('click', (e)=>{
    e.preventDefault();
    YSAuth.logout('admin-login.html');
  });
</script>
</body>
</html>
