  <main class="dash-main">
    <div class="dash-topbar">
      <div>
        <h1>My Kits</h1>
        <div class="sub">Everything your school has purchased for your grade</div>
      </div>
      <div class="topbar-actions">
        <button id="sidebarToggle" class="sidebar-toggle-btn" aria-label="Toggle sidebar" style="border:1px solid var(--ink-100);">
          <svg width="18" height="18" fill="none"><path d="M2 5h14M2 9h14M2 13h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <div class="profile-chip">
          <div class="profile-avatar">SR</div>
          <div><div class="name">Sarita Rao</div><div class="role">Teacher</div></div>
        </div>
      </div>
    </div>

    <div class="panel" data-aos="fade-up">
      <div class="kits-toolbar">
        <div class="search-box">
          <svg width="16" height="16" fill="none"><circle cx="7" cy="7" r="5" stroke="#94A3B8" stroke-width="1.6"/><path d="M11 11l3.5 3.5" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round"/></svg>
          <input type="text" id="kit-search" placeholder="Search kits by name or description..." aria-label="Search kits">
        </div>
        <select id="category-filter" class="category-select" aria-label="Filter by category">
          <option value="All">All Categories</option>
        </select>
      </div>

      <div class="kits-grid" id="kits-grid" aria-live="polite">
        <!-- skeleton / cards / empty-state injected here -->
      </div>

      <div class="table-pagination" id="kits-pagination" style="display:none;">
        <span id="kits-pagination-info">Showing 1–6</span>
        <div class="page-btns" id="kits-page-btns"></div>
      </div>
    </div>
  </main>
</div>

<script src="js/teacher.js"></script>
<script>
  const CATEGORY_ICONS = {
    "Engineering":   {stroke:"#22C55E", path:'<path d="M19 33V10a2 2 0 012-2h14a2 2 0 012 2v23" stroke="#22C55E" stroke-width="2.2" stroke-linecap="round"/><path d="M13 33h26" stroke="#22C55E" stroke-width="2.2" stroke-linecap="round"/>'},
    "Electronics":   {stroke:"#2563EB", path:'<circle cx="19" cy="19" r="4" stroke="#2563EB" stroke-width="2.2"/><path d="M19 10v5M19 23v5M10 19h5M23 19h5" stroke="#2563EB" stroke-width="2.2" stroke-linecap="round"/>'},
    "Earth Science": {stroke:"#F59E0B", path:'<path d="M19 6l12 5v8c0 9-5.5 14-12 16-6.5-2-12-7-12-16v-8l12-5z" stroke="#F59E0B" stroke-width="2.2" stroke-linejoin="round"/>'},
    "Robotics":      {stroke:"#7C3AED", path:'<rect x="11" y="13" width="16" height="14" rx="3" stroke="#7C3AED" stroke-width="2.2"/><circle cx="16" cy="20" r="1.6" fill="#7C3AED"/><circle cx="22" cy="20" r="1.6" fill="#7C3AED"/><path d="M19 13V8" stroke="#7C3AED" stroke-width="2.2" stroke-linecap="round"/>'},
    "Chemistry":     {stroke:"#06B6D4", path:'<path d="M16 8h6M17.5 8v8l-6 12a2 2 0 001.8 2.9h11.4A2 2 0 0027 28l-6-12V8" stroke="#06B6D4" stroke-width="2.2" stroke-linejoin="round"/>'},
    "Art & Design":  {stroke:"#DB2777", path:'<path d="M19 6a13 13 0 100 26c2 0 3-1 3-2.5s-1-2-2-2.5c-1-.5-1-2 0-2.5 3-1 6-4 6-9A11.5 11.5 0 0019 6z" stroke="#DB2777" stroke-width="2.2" stroke-linejoin="round"/>'}
  };

  function kitIconSvg(kit, size){
    const s = size || 38;
    const conf = CATEGORY_ICONS[kit.category] || CATEGORY_ICONS["Engineering"];
    return `<svg width="${s}" height="${s}" viewBox="0 0 38 38" fill="none">${conf.path}</svg>`;
  }

  const state = { all: [], filtered: [], page: 1, perPage: 6, query: "", category: "All" };

  function renderSkeleton(count){
    const grid = document.getElementById('kits-grid');
    let html = "";
    for(let i=0;i<count;i++){
      html += `
        <div class="skeleton-card">
          <div class="skeleton-thumb"></div>
          <div class="skeleton-body">
            <div class="skeleton-line w-40"></div>
            <div class="skeleton-line w-80"></div>
            <div class="skeleton-line w-60"></div>
            <div class="skeleton-line w-100"></div>
          </div>
        </div>`;
    }
    grid.innerHTML = html;
  }

  function renderEmptyState(){
    const grid = document.getElementById('kits-grid');
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg width="28" height="28" fill="none"><circle cx="14" cy="14" r="9" stroke="#2563EB" stroke-width="1.8"/><path d="M18 18l5.5 5.5" stroke="#2563EB" stroke-width="1.8" stroke-linecap="round"/></svg></div>
        <h4>No kits found</h4>
        <p>Try a different search term or category filter.</p>
      </div>`;
    document.getElementById('kits-pagination').style.display = 'none';
  }

  function renderCards(items){
    const grid = document.getElementById('kits-grid');
    if(!items.length){ renderEmptyState(); return; }
    grid.innerHTML = items.map((k, i) => `
      <div class="kit-page-card" style="animation-delay:${i * 60}ms" data-aos="fade-up">
        <div class="kit-page-thumb" style="background:${k.thumbColor}">${kitIconSvg(k)}</div>
        <div class="kit-page-body">
          <span class="kit-page-cat">${k.category}</span>
          <h4>${k.name}</h4>
          <p>${k.shortDesc}</p>
          <a class="btn btn-primary btn-block btn-sm ripple-btn" href="kit-details.html?id=${encodeURIComponent(k.id)}">View Kit</a>
        </div>
      </div>`).join("");
    if(window.TeacherUI) window.TeacherUI.initRipples(grid);
  }

  function renderPagination(pageInfo, totalItems){
    const pag = document.getElementById('kits-pagination');
    const btns = document.getElementById('kits-page-btns');
    const info = document.getElementById('kits-pagination-info');
    if(totalItems === 0){ pag.style.display = 'none'; return; }
    pag.style.display = 'flex';
    const start = (pageInfo.page - 1) * pageInfo.perPage + 1;
    const end = Math.min(pageInfo.page * pageInfo.perPage, totalItems);
    info.textContent = `Showing ${start}–${end} of ${totalItems} kits`;
    let html = `<button ${pageInfo.page === 1 ? "disabled" : ""} data-nav="prev">‹</button>`;
    for(let p = 1; p <= pageInfo.totalPages; p++){
      html += `<button class="${p === pageInfo.page ? "active" : ""}" data-page="${p}">${p}</button>`;
    }
    html += `<button ${pageInfo.page === pageInfo.totalPages ? "disabled" : ""} data-nav="next">›</button>`;
    btns.innerHTML = html;

    btns.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click', ()=>{
        if(b.dataset.nav === 'prev') state.page = Math.max(1, state.page - 1);
        else if(b.dataset.nav === 'next') state.page = Math.min(pageInfo.totalPages, state.page + 1);
        else state.page = parseInt(b.dataset.page, 10);
        renderPage();
      });
    });
  }

  function renderPage(){
    let list = TeacherAPI.searchKits(state.all, state.query);
    list = TeacherAPI.filterByCategory(list, state.category);
    state.filtered = list;
    const pageInfo = TeacherAPI.paginate(list, state.page, state.perPage);
    renderCards(pageInfo.items);
    renderPagination(pageInfo, list.length);
  }

  function populateCategories(){
    const select = document.getElementById('category-filter');
    TeacherAPI.getCategories().forEach(cat=>{
      const opt = document.createElement('option');
      opt.value = cat; opt.textContent = cat;
      select.appendChild(opt);
    });
  }

  function init(){
    populateCategories();
    renderSkeleton(6);

    // TODO: backend integration — TeacherAPI.getMyKits() already simulates
    // the network round-trip; once a real endpoint exists this stays the same.
    TeacherAPI.getMyKits().then(res=>{
      state.all = res.items;
      renderPage();
    });

    let debounce;
    document.getElementById('kit-search').addEventListener('input', (e)=>{
      clearTimeout(debounce);
      debounce = setTimeout(()=>{
        state.query = e.target.value;
        state.page = 1;
        renderPage();
      }, 200);
    });

    document.getElementById('category-filter').addEventListener('change', (e)=>{
      state.category = e.target.value;
      state.page = 1;
      renderPage();
    });
  }

  init();
</script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
    duration:600,
    once:true
});
</script>
</body>
</html>
