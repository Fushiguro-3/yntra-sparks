<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Yntra Sparks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
  body{ min-height:100vh; display:flex; flex-direction:column; }
  .login-header{ padding: var(--s-8) 0; }
  .login-header .container{ display:flex; align-items:center; justify-content:space-between; }
  .login-main{ flex:1; display:flex; align-items:center; padding: var(--s-12) 0 var(--s-20); }
  .login-head{ text-align:center; max-width:560px; margin:0 auto var(--s-16); }
  .login-head h1{ font-size:36px; margin-bottom:var(--s-3); }
  .login-head p{ color:var(--ink-500); font-size:16px; }

  .portal-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:var(--s-8); max-width:1100px; margin:0 auto; }
  .portal-card{
    background:#fff; border-radius:var(--r-xl); padding:var(--s-10) var(--s-8); text-align:center;
    border:1px solid var(--ink-100); box-shadow:var(--shadow-sm); transition: all .28s cubic-bezier(.2,.8,.2,1);
    display:flex; flex-direction:column; align-items:center;
  }
  .portal-card:hover{ transform: translateY(-10px) scale(1.02); box-shadow: var(--shadow-lg); border-color:transparent; }
  .portal-icon{
    width:88px; height:88px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    margin-bottom:var(--s-6); transition: transform .3s ease;
  }
  .portal-card:hover .portal-icon{ transform: scale(1.08) rotate(-4deg); }
  .portal-card h3{ font-size:20px; margin-bottom:var(--s-2); }
  .portal-card p{ font-size:14px; color:var(--ink-500); margin-bottom:var(--s-8); min-height:42px; }

  @media (max-width: 900px){ .portal-grid{ grid-template-columns:1fr; max-width:420px; } }
</style>
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
</head>
<body>

<header class="login-header">
  <div class="container">
    <a href="yntra-sparks.html" class="logo">
      <span class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="2" stroke-linejoin="round"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="2" stroke-linejoin="round"/></svg></span>
      Yntra Sparks
    </a>
    <a href="yntra-sparks.html" class="btn btn-ghost">← Back to Home</a>
  </div>
</header>

<main class="login-main">
  <div class="container">
    <div class="login-head">
      <span class="eyebrow" style="margin:0 auto var(--s-4); display:table;">Welcome Back</span>
      <h1>Choose your portal</h1>
      <p>Select how you'd like to sign in to Yntra Sparks.</p>
    </div>
    <div class="portal-card" style="max-width:500px; margin:0 auto;" data-aos="zoom-in">

    <h2 style="margin-bottom:10px; text-align:center;">Admin Login</h2>

    

    <form>

        <div class="form-field" style="margin-bottom:20px;">
            <label>Email Address</label>
            <input
                type="email"
                id="email"
                placeholder="admin@school.com"
                required
                style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px;">
        </div>

        <div class="form-field" style="margin-bottom:20px;">
            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter your password"
                required
                style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px;">
                <p id="error-message" style="color:#EF4444; display:none; margin-top:10px;">
    Invalid email or password.
</p>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">

            <label>
                <input type="checkbox">
                Remember Me
            </label>

            
        </div>
        <p id="loading-message" style="display:none; color:#2563EB; margin-bottom:15px;">
    Signing in...
</p>
        <button
            type="button"
            id="loginButton"
            class="btn btn-primary btn-block">

            Sign In

        </button>

    </form>

</div>
    
    
</main>

<script>
  // Highlight the portal card matching the URL hash (e.g. login.html#teacher)
  const hash = window.location.hash.replace('#','');
  if(hash){
    const el = document.getElementById(hash);
    if(el){ el.style.borderColor = 'var(--blue)'; el.style.boxShadow = 'var(--shadow-glow-blue)'; }
  }
</script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({
    duration:800,
    once:true
});
</script>
<script>

const button=document.getElementById("loginButton");

button.addEventListener("click",()=>{

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

const error=document.getElementById("error-message");

const loading=document.getElementById("loading-message");

error.style.display="none";

if(email.trim()==="" || password.trim()===""){
    error.innerHTML="Please fill all fields.";
    error.style.display="block";
    return;
}

const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailRegex.test(email)){
    error.innerHTML="Please enter a valid email address.";
    error.style.display="block";
    return;
}

if(password.length<8){
    error.innerHTML="Password must be at least 8 characters.";
    error.style.display="block";
    return;
}

loading.style.display="block";
button.disabled=true;
button.innerHTML="Signing In...";

setTimeout(()=>{

loading.style.display="none";
button.disabled=false;
button.innerHTML="Sign In";

window.location.href="admin-portal.html";

},1500);

});

</script>
</body>
</html>
