spring:
  application:
    name: yntra-sparks-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/yntra_sparks
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: 8080

app:
  upload:
    manual-dir: uploads/manuals
  jwt:
    secret: ${JWT_SECRET:change-this-in-env-never-commit-real-secret}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  s3:
    bucket-name: ${AWS_S3_BUCKET:yntra-sparks-manuals-prod}
    region: ${AWS_REGION:ap-south-1}

cors:
  allowed-origins: http://localhost:5173,http://127.0.0.1:5173

# Add this block to application.yml, alongside your existing "app:" section


